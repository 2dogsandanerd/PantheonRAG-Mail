<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting PantheonMail</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 30px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .progress-dots {
      display: inline-block;
      width: 20px;
      text-align: left;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .progress-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>RAG Platform V1</h1>
    <p>Starting backend services<span class="progress-dots"></span></p>
    <p style="font-size: 14px; opacity: 0.7; margin-top: 20px;">
      This may take a few seconds
    </p>
  </div>
</body>
</html>
